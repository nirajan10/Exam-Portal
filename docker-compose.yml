services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: examdb
      POSTGRES_USER: examuser
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U examuser -d examdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      args:
        DOCKER_GID: ${DOCKER_GID:-999}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://examuser:${DB_PASSWORD}@db:5432/examdb?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      PORT: 8080
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      LLM_SERVICE_URL: http://llm-service:8000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    ports:
      - "8080:8080"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  llm-service:
    build: ./llm-service
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379/0
      MODEL_REPO: Qwen/Qwen2.5-7B-Instruct-GGUF
      MODEL_FILE: qwen2.5-7b-instruct-q3_k_m.gguf
      N_GPU_LAYERS: "-1"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - llm-models:/app/models
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "9999:80"
    depends_on:
      - backend
    networks:
      - internal

volumes:
  pgdata:
  uploads:
  llm-models:

networks:
  internal:
    driver: bridge
